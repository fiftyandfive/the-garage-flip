<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Pricing Tool — The Garage Flip</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: "#ea580c" } },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      html, body { background: #0a0a0a; color: #fff; }
      body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; }
      @keyframes tgfShake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-8px); }
        40%, 80% { transform: translateX(8px); }
      }
      .tgf-shake { animation: tgfShake 0.4s ease; }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        height: 20px; width: 20px; border-radius: 50%;
        background: #ea580c; cursor: pointer; border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      input[type="range"]::-moz-range-thumb {
        height: 20px; width: 20px; border-radius: 50%;
        background: #ea580c; cursor: pointer; border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel (in-browser transpile — internal tool, ok) -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.3/babel.min.js"></script>

    <!-- Password gate -->
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useCallback, useMemo, useRef } = React;
      const AUTH_KEY = "tgf_pricing_auth_v1";
      const PASSWORD = "garageflip2024";

      function PasswordGate({ onUnlock }) {
        const [pw, setPw] = useState("");
        const [err, setErr] = useState(false);
        const [shakeKey, setShakeKey] = useState(0);

        const submit = (e) => {
          e && e.preventDefault();
          if (pw === PASSWORD) {
            try { sessionStorage.setItem(AUTH_KEY, "1"); } catch (_) {}
            onUnlock();
          } else {
            setErr(true);
            setShakeKey((k) => k + 1);
            setTimeout(() => setErr(false), 1800);
          }
        };

        return (
          <div className="min-h-screen flex items-center justify-center px-4 bg-zinc-950">
            <div className="w-full max-w-sm">
              <div className="text-center mb-8">
                <div className="inline-flex items-center gap-2 mb-5">
                  <div className="w-10 h-10 rounded-xl bg-orange-600 flex items-center justify-center font-black text-sm">TG</div>
                  <div className="text-left">
                    <div className="font-black tracking-tight leading-none text-sm">THE GARAGE FLIP</div>
                    <div className="text-[10px] text-orange-400 tracking-[0.18em] uppercase leading-none mt-1">Internal Pricing Tool</div>
                  </div>
                </div>
                <h1 className="text-xl font-bold text-zinc-100 mb-2">Restricted access</h1>
                <p className="text-sm text-zinc-500">Enter the team password to continue.</p>
              </div>
              <form onSubmit={submit} className="space-y-3">
                <input
                  key={shakeKey}
                  autoFocus
                  type="password"
                  value={pw}
                  onChange={(e) => setPw(e.target.value)}
                  placeholder="Password"
                  className={`w-full bg-zinc-900 border rounded-lg px-4 py-3 text-white text-sm outline-none transition ${err ? "border-red-500 tgf-shake" : "border-zinc-800 focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30"}`}
                />
                <button
                  type="submit"
                  className="w-full bg-orange-600 hover:bg-orange-500 text-white font-semibold text-sm py-3 rounded-lg transition shadow-lg shadow-orange-600/20"
                >
                  Enter
                </button>
                <div className={`text-xs text-center h-4 transition-opacity ${err ? "opacity-100 text-red-400" : "opacity-0"}`}>
                  Incorrect password
                </div>
              </form>
            </div>
          </div>
        );
      }

      /* === PRICING APP (pasted source) === */
      const DEFAULT_SETTINGS = {
        monthlyExpenses: 3000,
        dumpFeeFull: 85,
        cubicYardsPerLoad: 15,
        minimumCharge: 50,
        pricePerMile: 1.5,
        profitPerYard: 25,
        pricePerYard: null,
        locationMultipliers: { outside: 1.0, inside: 1.3, basement: 1.6 },
        rushMultiplier: 0.25,
        dmSetterFee: 5,
        ccFee: 3,
        defaultHourlyRate: 25,
        addOns: [
          { name: "TV Disposal", price: 35, enabled: true },
          { name: "Mattress", price: 40, enabled: true },
          { name: "Appliance (Standard)", price: 45, enabled: true },
          { name: "Tire", price: 15, enabled: true },
          { name: "Paint Can", price: 10, enabled: true },
          { name: "E-Waste", price: 20, enabled: true },
          { name: "Hot Tub", price: 350, enabled: true },
          { name: "Piano", price: 300, enabled: true },
          { name: "Refrigerator (Freon)", price: 65, enabled: true },
          { name: "Bag of Concrete/Dirt", price: 25, enabled: true },
          { name: "Construction Debris (per yd)", price: 55, enabled: true },
          { name: "Couch/Sofa", price: 50, enabled: true },
        ],
        garageAddOns: [
          { name: "Epoxy Floor Coating", price: 1200, enabled: true },
          { name: "Wall-Mounted Shelving System", price: 350, enabled: true },
          { name: "Overhead Storage Rack", price: 450, enabled: true },
          { name: "Workbench Installation", price: 275, enabled: true },
          { name: "Pegboard/Tool Organization", price: 150, enabled: true },
          { name: "Cabinet Installation (per unit)", price: 200, enabled: true },
          { name: "Bike Rack/Hooks", price: 75, enabled: true },
        ],
        garageSizes: {
          "1-car": { sqft: 200, label: "1-Car Garage (~200 sq ft)" },
          "2-car": { sqft: 400, label: "2-Car Garage (~400 sq ft)" },
          "3-car": { sqft: 600, label: "3-Car Garage (~600 sq ft)" },
        },
        garageBaseRate: 0.75,
        cleaningLevels: {
          basic: { multiplier: 1.0, label: "Basic", desc: "Sweep, organize, declutter" },
          deep: { multiplier: 2.0, label: "Deep Clean", desc: "Power wash floor, degrease, organize" },
          full: { multiplier: 3.5, label: "Full Reset", desc: "Deep clean + paint floor + shelving install" },
        },
        conditionMultipliers: { 1: 0.7, 2: 0.85, 3: 1.0, 4: 1.3, 5: 1.7 },
      };

      function loadSettings() {
        try {
          const saved = localStorage.getItem("garageFlipSettings");
          if (saved) return { ...DEFAULT_SETTINGS, ...JSON.parse(saved) };
        } catch (e) {}
        return { ...DEFAULT_SETTINGS };
      }
      function saveSettings(s) {
        try { localStorage.setItem("garageFlipSettings", JSON.stringify(s)); } catch (e) {}
      }

      const Icon = ({ d, size = 20, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d} /></svg>
      );
      const TruckIcon = (p) => <Icon {...p} d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8zM5.5 18.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5zM18.5 18.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" />;
      const GarageIcon = (p) => <Icon {...p} d="M3 21V9l9-6 9 6v12H3zM9 21v-6h6v6" />;
      const SettingsIcon = (p) => <Icon {...p} d="M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />;
      const CopyIcon = (p) => <Icon {...p} d="M20 9h-9a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-9a2 2 0 00-2-2zM5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />;
      const ChevronDown = (p) => <Icon {...p} d="M6 9l6 6 6-6" />;
      const XIcon = (p) => <Icon {...p} d="M18 6L6 18M6 6l12 12" />;
      const CheckIcon = (p) => <Icon {...p} d="M20 6L9 17l-5-5" />;

      const Card = ({ children, className = "" }) => (
        <div className={`bg-zinc-900 border border-zinc-800 rounded-lg p-4 sm:p-5 ${className}`}>{children}</div>
      );
      const Label = ({ children, sub }) => (
        <label className="block mb-1.5">
          <span className="text-sm font-semibold text-zinc-200 tracking-wide uppercase">{children}</span>
          {sub && <span className="block text-xs text-zinc-500 mt-0.5 normal-case tracking-normal">{sub}</span>}
        </label>
      );
      const Input = ({ value, onChange, type = "text", placeholder = "", className = "", ...rest }) => (
        <input type={type} value={value} onChange={onChange} placeholder={placeholder}
          className={`w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2.5 text-white text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 transition placeholder-zinc-500 ${className}`}
          {...rest} />
      );
      const Button = ({ children, onClick, variant = "primary", className = "", ...rest }) => {
        const base = "px-4 py-2.5 rounded font-semibold text-sm transition-all duration-200 flex items-center gap-2 justify-center";
        const variants = {
          primary: "bg-orange-600 hover:bg-orange-500 text-white shadow-lg shadow-orange-600/20",
          secondary: "bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700",
          danger: "bg-red-900/50 hover:bg-red-800/50 text-red-300 border border-red-800/50",
          ghost: "hover:bg-zinc-800 text-zinc-400 hover:text-zinc-200",
        };
        return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`} {...rest}>{children}</button>;
      };
      const Toggle = ({ checked, onChange }) => (
        <button onClick={() => onChange(!checked)}
          className={`relative w-11 h-6 rounded-full transition-colors duration-200 ${checked ? "bg-orange-600" : "bg-zinc-700"}`}>
          <span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition-transform duration-200 ${checked ? "translate-x-5" : ""}`} />
        </button>
      );
      const Slider = ({ value, onChange, min = 0, max = 20, step = 0.5, label, unit = "" }) => {
        const pct = ((value - min) / (max - min)) * 100;
        return (
          <div>
            {label && <Label>{label}</Label>}
            <div className="flex items-center gap-4">
              <div className="flex-1 relative">
                <input type="range" min={min} max={max} step={step} value={value}
                  onChange={(e) => onChange(parseFloat(e.target.value))}
                  className="w-full h-2 rounded-full appearance-none cursor-pointer"
                  style={{ background: `linear-gradient(to right, #ea580c ${pct}%, #3f3f46 ${pct}%)` }} />
              </div>
              <span className="text-orange-400 font-bold text-lg min-w-[60px] text-right tabular-nums">{value}{unit}</span>
            </div>
          </div>
        );
      };
      const Dropdown = ({ options, value, onChange, placeholder = "Select..." }) => {
        const [open, setOpen] = useState(false);
        const ref = useRef(null);
        useEffect(() => {
          const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
          document.addEventListener("mousedown", h);
          return () => document.removeEventListener("mousedown", h);
        }, []);
        const selected = options.find((o) => o.value === value);
        return (
          <div ref={ref} className="relative">
            <button onClick={() => setOpen(!open)} className="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2.5 text-sm text-left flex items-center justify-between focus:outline-none focus:border-orange-500 transition">
              <span className={selected ? "text-white" : "text-zinc-500"}>{selected ? selected.label : placeholder}</span>
              <ChevronDown size={16} className={`text-zinc-500 transition-transform ${open ? "rotate-180" : ""}`} />
            </button>
            {open && (
              <div className="absolute z-50 mt-1 w-full bg-zinc-800 border border-zinc-700 rounded shadow-xl max-h-60 overflow-y-auto">
                {options.map((o) => (
                  <button key={o.value} onClick={() => { onChange(o.value); setOpen(false); }} className={`w-full text-left px-3 py-2 text-sm hover:bg-zinc-700 transition ${o.value === value ? "text-orange-400 bg-zinc-700/50" : "text-zinc-200"}`}>
                    {o.label}
                    {o.sub && <span className="block text-xs text-zinc-500">{o.sub}</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      };
      const Accordion = ({ title, children, defaultOpen = false }) => {
        const [open, setOpen] = useState(defaultOpen);
        return (
          <div className="border border-zinc-800 rounded-lg overflow-hidden">
            <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-4 py-3 bg-zinc-900 hover:bg-zinc-800/80 transition text-sm font-semibold text-zinc-200">
              {title}
              <ChevronDown size={16} className={`text-zinc-500 transition-transform duration-200 ${open ? "rotate-180" : ""}`} />
            </button>
            <div className={`transition-all duration-300 ${open ? "max-h-[2000px] opacity-100" : "max-h-0 opacity-0"} overflow-hidden`}>
              <div className="px-4 py-3 bg-zinc-900/50 border-t border-zinc-800">{children}</div>
            </div>
          </div>
        );
      };
      const MultiSelect = ({ options, selected, onChange, placeholder = "Search add-ons..." }) => {
        const [search, setSearch] = useState("");
        const [open, setOpen] = useState(false);
        const ref = useRef(null);
        useEffect(() => {
          const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
          document.addEventListener("mousedown", h);
          return () => document.removeEventListener("mousedown", h);
        }, []);
        const filtered = options.filter((o) => o.name.toLowerCase().includes(search.toLowerCase()) && o.enabled);
        return (
          <div ref={ref} className="relative">
            <div onClick={() => setOpen(true)} className="bg-zinc-800 border border-zinc-700 rounded px-3 py-2 min-h-[42px] cursor-pointer focus-within:border-orange-500 transition">
              <div className="flex flex-wrap gap-1.5 mb-1">
                {selected.map((item) => (
                  <span key={item.name} className="inline-flex items-center gap-1 bg-orange-600/20 text-orange-400 text-xs px-2 py-1 rounded border border-orange-600/30">
                    {item.name} (${item.price})
                    <button onClick={(e) => { e.stopPropagation(); onChange(selected.filter((s) => s.name !== item.name)); }} className="hover:text-orange-200"><XIcon size={12} /></button>
                  </span>
                ))}
              </div>
              <input value={search} onChange={(e) => setSearch(e.target.value)} onFocus={() => setOpen(true)} placeholder={selected.length ? "" : placeholder} className="bg-transparent text-sm text-white outline-none w-full placeholder-zinc-500" />
            </div>
            {open && filtered.length > 0 && (
              <div className="absolute z-50 mt-1 w-full bg-zinc-800 border border-zinc-700 rounded shadow-xl max-h-48 overflow-y-auto">
                {filtered.filter((o) => !selected.find((s) => s.name === o.name)).map((o) => (
                  <button key={o.name} onClick={() => { onChange([...selected, o]); setSearch(""); }} className="w-full text-left px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-700 transition flex justify-between">
                    <span>{o.name}</span><span className="text-orange-400 font-semibold">${o.price}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      };
      const fmt = (n) => "$" + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

      function JunkRemovalCalc({ settings }) {
        const [miles, setMiles] = useState("");
        const [cubicYards, setCubicYards] = useState(5);
        const [location, setLocation] = useState("outside");
        const [selectedAddOns, setSelectedAddOns] = useState([]);
        const [driveTime, setDriveTime] = useState(30);
        const [onSiteTime, setOnSiteTime] = useState(60);
        const [people, setPeople] = useState([{ rate: settings.defaultHourlyRate }, { rate: settings.defaultHourlyRate }]);
        const [rushJob, setRushJob] = useState(false);
        const [dmSetter, setDmSetter] = useState(false);
        const [ccFee, setCcFee] = useState(true);
        const [copied, setCopied] = useState(false);

        const pricePerYard = settings.pricePerYard || ((settings.dumpFeeFull / settings.cubicYardsPerLoad) + (settings.monthlyExpenses / 30 / 10) + settings.profitPerYard);

        const calc = useMemo(() => {
          const milesNum = parseFloat(miles) || 0;
          const milesCost = milesNum * settings.pricePerMile * 2;
          const baseCost = cubicYards * pricePerYard;
          const locMult = settings.locationMultipliers[location] || 1;
          const locCost = baseCost * locMult;
          const addOnTotal = selectedAddOns.reduce((sum, a) => sum + a.price, 0);
          const totalMinutes = driveTime + onSiteTime;
          const laborCost = people.reduce((sum, p) => sum + (p.rate * (totalMinutes / 60)), 0);
          let subtotal = locCost + milesCost + addOnTotal + laborCost;
          const rushAmt = rushJob ? subtotal * settings.rushMultiplier : 0;
          subtotal += rushAmt;
          const dmAmt = dmSetter ? subtotal * (settings.dmSetterFee / 100) : 0;
          const ccAmt = ccFee ? (subtotal + dmAmt) * (settings.ccFee / 100) : 0;
          const total = Math.max(subtotal + dmAmt + ccAmt, settings.minimumCharge);
          return { milesCost, baseCost, locCost, addOnTotal, laborCost, rushAmt, dmAmt, ccAmt, subtotal, total, locMult, totalMinutes };
        }, [miles, cubicYards, location, selectedAddOns, driveTime, onSiteTime, people, rushJob, dmSetter, ccFee, settings, pricePerYard]);

        const clear = () => {
          setMiles(""); setCubicYards(5); setLocation("outside"); setSelectedAddOns([]);
          setDriveTime(30); setOnSiteTime(60); setPeople([{ rate: settings.defaultHourlyRate }, { rate: settings.defaultHourlyRate }]);
          setRushJob(false); setDmSetter(false); setCcFee(true);
        };

        const copyQuote = () => {
          const locLabels = { outside: "Outside (0-30 min)", inside: "Inside (30-60 min)", basement: "Basement (1-2 hrs)" };
          let q = `THE GARAGE FLIP — Junk Removal Quote\n`;
          q += `--------------------------------------\n`;
          q += `Miles to Job: ${miles || "0"} mi\n`;
          q += `Volume: ${cubicYards} yd³\n`;
          q += `Location: ${locLabels[location]}\n`;
          if (selectedAddOns.length) q += `Add-Ons: ${selectedAddOns.map((a) => `${a.name} ($${a.price})`).join(", ")}\n`;
          q += `\nLabor: ${people.length} people × ${calc.totalMinutes} min = ${fmt(calc.laborCost)}\n`;
          if (rushJob) q += `Rush Job: +${fmt(calc.rushAmt)}\n`;
          if (dmSetter) q += `DM Setter Fee (${settings.dmSetterFee}%): +${fmt(calc.dmAmt)}\n`;
          if (ccFee) q += `CC Fee (${settings.ccFee}%): +${fmt(calc.ccAmt)}\n`;
          q += `--------------------------------------\n`;
          q += `TOTAL: ${fmt(calc.total)}\n`;
          if (calc.total <= settings.minimumCharge) q += `(Minimum charge applied)\n`;
          navigator.clipboard.writeText(q);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        return (
          <div className="space-y-4">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <Card>
                <Label sub="One-way distance">Miles to Job</Label>
                <Input type="number" value={miles} onChange={(e) => setMiles(e.target.value)} placeholder="0" min="0" />
              </Card>
              <Card>
                <Label sub={`${fmt(pricePerYard)}/yd³`}>Cubic Yards</Label>
                <Slider value={cubicYards} onChange={setCubicYards} min={0} max={20} step={0.5} unit=" yd³" />
              </Card>
            </div>
            <Card>
              <Label sub="Affects time and pricing multiplier">Location</Label>
              <div className="grid grid-cols-3 gap-2">
                {[
                  { key: "outside", label: "Outside", sub: "0–30 min" },
                  { key: "inside", label: "Inside", sub: "30–60 min" },
                  { key: "basement", label: "Basement", sub: "1–2 hrs" },
                ].map((loc) => (
                  <button key={loc.key} onClick={() => setLocation(loc.key)}
                    className={`py-3 px-2 rounded border text-center transition-all duration-200 ${location === loc.key ? "bg-orange-600/20 border-orange-500 text-orange-400" : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-600"}`}>
                    <div className="font-semibold text-sm">{loc.label}</div>
                    <div className="text-xs mt-0.5 opacity-70">{loc.sub}</div>
                    <div className="text-xs mt-0.5 text-zinc-500">×{settings.locationMultipliers[loc.key]}</div>
                  </button>
                ))}
              </div>
            </Card>
            <Card>
              <Label sub="Search and select special items">Add-On Items</Label>
              <MultiSelect options={settings.addOns} selected={selectedAddOns} onChange={setSelectedAddOns} />
            </Card>
            <Card>
              <Label>Team Labor & Time</Label>
              <div className="grid grid-cols-2 gap-3 mb-4">
                <div>
                  <span className="text-xs text-zinc-500 mb-1 block">Drive Time (min)</span>
                  <Input type="number" value={driveTime} onChange={(e) => setDriveTime(parseInt(e.target.value) || 0)} min="0" />
                </div>
                <div>
                  <span className="text-xs text-zinc-500 mb-1 block">On-Site Time (min)</span>
                  <Input type="number" value={onSiteTime} onChange={(e) => setOnSiteTime(parseInt(e.target.value) || 0)} min="0" />
                </div>
              </div>

      function GarageCleaningCalc({ settings }) {
        const [garageSize, setGarageSize] = useState("2-car");
        const [customSqft, setCustomSqft] = useState("");
        const [cleaningLevel, setCleaningLevel] = useState("basic");
        const [condition, setCondition] = useState(3);
        const [selectedAddOns, setSelectedAddOns] = useState([]);
        const [needsJunkRemoval, setNeedsJunkRemoval] = useState(false);
        const [copied, setCopied] = useState(false);

        const sqft = garageSize === "custom" ? (parseFloat(customSqft) || 0) : (settings.garageSizes[garageSize]?.sqft || 0);
        const levelInfo = settings.cleaningLevels[cleaningLevel];
        const condMult = settings.conditionMultipliers[condition] || 1;

        const calc = useMemo(() => {
          const baseCost = sqft * settings.garageBaseRate;
          const levelCost = baseCost * levelInfo.multiplier;
          const condCost = levelCost * condMult;
          const addOnTotal = selectedAddOns.reduce((sum, a) => sum + a.price, 0);
          const total = condCost + addOnTotal;
          const hoursEstimate = (sqft / 100) * levelInfo.multiplier * condMult * 0.5;
          return { baseCost, levelCost, condCost, addOnTotal, total, hoursEstimate };
        }, [sqft, cleaningLevel, condition, selectedAddOns, settings, levelInfo, condMult]);

        const condLabels = ["", "Pristine", "Slightly Messy", "Average", "Very Cluttered", "Disaster Zone"];
        const condColors = ["", "text-emerald-400", "text-lime-400", "text-yellow-400", "text-orange-400", "text-red-400"];

        const copyQuote = () => {
          const sizeLabel = garageSize === "custom" ? `${customSqft} sq ft (custom)` : settings.garageSizes[garageSize].label;
          let q = `THE GARAGE FLIP — Garage Cleaning Quote\n`;
          q += `------------------------------------------\n`;
          q += `Garage Size: ${sizeLabel}\n`;
          q += `Cleaning Level: ${levelInfo.label} — ${levelInfo.desc}\n`;
          q += `Current Condition: ${condLabels[condition]} (${condition}/5)\n`;
          q += `Est. Time: ${calc.hoursEstimate.toFixed(1)} hours\n`;
          if (selectedAddOns.length) q += `Add-Ons: ${selectedAddOns.map((a) => `${a.name} ($${a.price})`).join(", ")}\n`;
          q += `------------------------------------------\n`;
          q += `TOTAL: ${fmt(calc.total)}\n`;
          if (needsJunkRemoval) q += `\n⚠️ Client also needs junk removal — see separate quote.\n`;
          navigator.clipboard.writeText(q);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        return (
          <div className="space-y-4">
            <Card>
              <Label sub="Select garage type or enter custom sq ft">Garage Size</Label>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
                {[...Object.entries(settings.garageSizes).map(([k, v]) => ({ key: k, label: k.replace("-", " ").replace(/\b\w/g, (c) => c.toUpperCase()), sub: `~${v.sqft} sq ft` })),
                  { key: "custom", label: "Custom", sub: "Enter sq ft" }
                ].map((s) => (
                  <button key={s.key} onClick={() => setGarageSize(s.key)}
                    className={`py-3 px-2 rounded border text-center transition-all ${garageSize === s.key ? "bg-orange-600/20 border-orange-500 text-orange-400" : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-600"}`}>
                    <div className="font-semibold text-sm">{s.label}</div>
                    <div className="text-xs mt-0.5 opacity-70">{s.sub}</div>
                  </button>
                ))}
              </div>
              {garageSize === "custom" && (
                <Input type="number" value={customSqft} onChange={(e) => setCustomSqft(e.target.value)} placeholder="Enter square footage" />
              )}
            </Card>
            <Card>
              <Label sub="Select the scope of work">Cleaning Level</Label>
              <div className="space-y-2">
                {Object.entries(settings.cleaningLevels).map(([k, v]) => (
                  <button key={k} onClick={() => setCleaningLevel(k)}
                    className={`w-full text-left px-4 py-3 rounded border transition-all ${cleaningLevel === k ? "bg-orange-600/20 border-orange-500" : "bg-zinc-800 border-zinc-700 hover:border-zinc-600"}`}>
                    <div className="flex justify-between items-center">
                      <div>
                        <span className={`font-semibold text-sm ${cleaningLevel === k ? "text-orange-400" : "text-zinc-200"}`}>{v.label}</span>
                        <span className="text-xs text-zinc-500 block mt-0.5">{v.desc}</span>
                      </div>
                      <span className="text-xs text-zinc-500">×{v.multiplier}</span>
                    </div>
                  </button>
                ))}
              </div>
            </Card>
            <Card>
              <Label sub="How bad is it right now?">Current Condition</Label>
              <div className="flex items-center gap-3 mb-2">
                {[1, 2, 3, 4, 5].map((n) => (
                  <button key={n} onClick={() => setCondition(n)}
                    className={`w-12 h-12 rounded-lg border font-bold text-lg transition-all ${condition === n ? "bg-orange-600 border-orange-500 text-white scale-110" : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-600"}`}>
                    {n}
                  </button>
                ))}
              </div>
              <div className="flex justify-between text-xs">
                <span className="text-emerald-400">Pristine</span>
                <span className={`font-semibold ${condColors[condition]}`}>{condLabels[condition]} (×{condMult})</span>
                <span className="text-red-400">Disaster</span>
              </div>
            </Card>
            <Card>
              <Label sub="Upgrades and installations">Garage Add-Ons</Label>
              <MultiSelect options={settings.garageAddOns} selected={selectedAddOns} onChange={setSelectedAddOns} placeholder="Search garage add-ons..." />

            <Card>

                <Toggle checked={needsJunkRemoval} onChange={setNeedsJunkRemoval} />
              </div>
              {needsJunkRemoval && (
                <div className="mt-3 p-3 bg-orange-600/10 border border-orange-600/20 rounded text-xs text-orange-400">
                  Switch to the Junk Removal tab to calculate that portion separately.
                </div>
              )}
            </Card>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 flex items-center justify-between">
              <span className="text-sm text-zinc-400 font-semibold uppercase tracking-wider">Est. Time</span>
              <span className="text-xl font-bold text-zinc-200">{calc.hoursEstimate.toFixed(1)} <span className="text-sm font-normal text-zinc-500">hours</span></span>
            </div>
            <div className="bg-gradient-to-r from-orange-600/20 via-orange-600/10 to-zinc-900 border border-orange-500/30 rounded-lg p-5">
              <div className="flex items-center justify-between mb-4">
                <span className="text-zinc-400 text-sm font-semibold uppercase tracking-wider">Estimated Total</span>
                <span className="text-3xl sm:text-4xl font-black text-white tabular-nums">{fmt(calc.total)}</span>
              </div>
              <div className="flex gap-2 flex-wrap">
                <Button onClick={copyQuote}>
                  {copied ? <><CheckIcon size={16} /> Copied!</> : <><CopyIcon size={16} /> Copy Quote</>}
                </Button>
              </div>
            </div>
            <Accordion title="View Price Breakdown">
              <div className="space-y-2 text-sm">
                {[
                  ["Base (sq ft)", `${sqft} sq ft × ${fmt(settings.garageBaseRate)} = ${fmt(calc.baseCost)}`],
                  ["Cleaning Level", `${levelInfo.label} (×${levelInfo.multiplier}) = ${fmt(calc.levelCost)}`],
                  ["Condition", `${condLabels[condition]} (×${condMult}) = ${fmt(calc.condCost)}`],
                  ["Add-Ons", fmt(calc.addOnTotal)],
                ].map(([label, val], i) => (
                  <div key={i} className="flex justify-between py-1 border-b border-zinc-800/50">
                    <span className="text-zinc-400">{label}</span>
                    <span className="text-zinc-200 font-medium tabular-nums">{val}</span>
                  </div>
                ))}
                <div className="flex justify-between pt-2 text-base font-bold">
                  <span className="text-orange-400">TOTAL</span>
                  <span className="text-white">{fmt(calc.total)}</span>
                </div>
              </div>
            </Accordion>
          </div>
        );
      }

        const [settings, setSettings] = useState(loadSettings);
        const [activeTab, setActiveTab] = useState("junk");
        const [activePage, setActivePage] = useState("calc");
        const lock = () => { try { sessionStorage.removeItem(AUTH_KEY); } catch (_) {} window.location.reload(); };

        return (
          <div className="min-h-screen bg-zinc-950 text-white" style={{ fontFamily: "'Inter', 'SF Pro Display', -apple-system, sans-serif" }}>
            <header className="sticky top-0 z-40 bg-zinc-950/95 backdrop-blur border-b border-zinc-800">
              <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black text-sm">TG</div>
                  <div>
                    <div className="font-black text-sm tracking-tight leading-none">THE GARAGE FLIP</div>
                    <div className="text-[10px] text-orange-400 tracking-widest uppercase leading-none mt-0.5">Internal Pricing Tool</div>
                  </div>
                </div>
                <div className="flex items-center gap-1">
                  <button onClick={() => setActivePage(activePage === "setup" ? "calc" : "setup")}
                    className={`p-2 rounded-lg transition ${activePage === "setup" ? "bg-orange-600 text-white" : "text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800"}`} title="Settings">
                    <SettingsIcon size={20} />
                  </button>
                  <button onClick={lock} className="p-2 rounded-lg text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800 transition" title="Lock">
                    <XIcon size={20} />
                  </button>
                </div>
              </div>
            </header>
            <main className="max-w-lg mx-auto px-4 py-4 pb-24">
              {activePage === "setup" ? (
                <>
                  <h2 className="text-lg font-bold mb-4 text-zinc-200">Setup & Settings</h2>
                  <SetupPage settings={settings} setSettings={setSettings} />
                </>
              ) : (
                <>
                  <div className="flex bg-zinc-900 rounded-lg p-1 mb-5 border border-zinc-800">
                    <button onClick={() => setActiveTab("junk")}
                      className={`flex-1 py-2.5 rounded-md text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 ${activeTab === "junk" ? "bg-orange-600 text-white shadow-lg shadow-orange-600/20" : "text-zinc-500 hover:text-zinc-300"}`}>
                      <TruckIcon size={16} /> Junk Removal
                    </button>
                    <button onClick={() => setActiveTab("garage")}
                      className={`flex-1 py-2.5 rounded-md text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 ${activeTab === "garage" ? "bg-orange-600 text-white shadow-lg shadow-orange-600/20" : "text-zinc-500 hover:text-zinc-300"}`}>
                      <GarageIcon size={16} /> Garage Cleaning
                    </button>
                  </div>
                  {activeTab === "junk" ? (
                    <JunkRemovalCalc settings={settings} />
                  ) : (
                    <GarageCleaningCalc settings={settings} />
                  )}
                </>
              )}
            </main>
          </div>
        );
      }

      function Root() {
        const [unlocked, setUnlocked] = useState(() => {
          try { return sessionStorage.getItem(AUTH_KEY) === "1"; } catch (_) { return false; }
        });
        if (!unlocked) return <PasswordGate onUnlock={() => setUnlocked(true)} />;
        return <App />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Root />);
    </script>
  </body>
</html>
